<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>
  <body>
    <script>
      (function () {
        const COMPONENT_READY = "streamlit:componentReady";
        const SET_COMPONENT_VALUE = "streamlit:setComponentValue";
        const SET_FRAME_HEIGHT = "streamlit:setFrameHeight";
        const RENDER_EVENT = "streamlit:render";

        function getTargetWindow() {
          try {
            if (window.parent && window.parent !== window) {
              return window.parent;
            }
          } catch (_err) {
            // No-op
          }
          try {
            if (window.top && window.top !== window) {
              return window.top;
            }
          } catch (_err) {
            // No-op
          }
          return window;
        }

        function readStoredLogin() {
          let loginValue = "";
          const targetWindow = getTargetWindow();
          try {
            loginValue = String(
              targetWindow.localStorage.getItem("jira_focus_user_login") || ""
            )
              .trim()
              .toLowerCase();
            if (!loginValue) {
              const rawProfile = targetWindow.localStorage.getItem("jira_focus_user_profile") || "";
              if (rawProfile) {
                const parsedProfile = JSON.parse(rawProfile);
                if (parsedProfile && typeof parsedProfile === "object") {
                  loginValue = String(
                    parsedProfile.login || parsedProfile.emailAddress || ""
                  )
                    .trim()
                    .toLowerCase();
                }
              }
            }
            if (!loginValue) {
              loginValue = String(targetWindow.localStorage.getItem("emailAddress") || "")
                .trim()
                .toLowerCase();
            }
            if (loginValue) {
              targetWindow.localStorage.setItem("jira_focus_user_login", loginValue);
            }
          } catch (_err) {
            loginValue = "";
          }
          return loginValue;
        }

        function sendMessage(type, payload) {
          window.parent.postMessage(
            Object.assign({ isStreamlitMessage: true, type: type }, payload || {}),
            "*"
          );
        }

        function setComponentReady() {
          sendMessage(COMPONENT_READY, { apiVersion: 1 });
        }

        function setFrameHeight(height) {
          sendMessage(SET_FRAME_HEIGHT, { height: Number(height || 0) });
        }

        function setComponentValue(value) {
          sendMessage(SET_COMPONENT_VALUE, {
            value: value,
            dataType: "json",
          });
        }

        function onRenderMessage(event) {
          if (!event || !event.data || event.data.type !== RENDER_EVENT) {
            return;
          }
          setComponentValue(readStoredLogin());
          setFrameHeight(0);
        }

        window.addEventListener("message", onRenderMessage);
        setComponentReady();
        setFrameHeight(0);
      })();
    </script>
  </body>
</html>
