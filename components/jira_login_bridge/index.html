<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://unpkg.com/streamlit-component-lib@1.4.0/dist/index.js"></script>
  </head>
  <body>
    <script>
      (function () {
        const Streamlit = window.Streamlit;

        function getTargetWindow() {
          try {
            if (window.parent && window.parent !== window) {
              return window.parent;
            }
          } catch (_err) {
            // No-op
          }
          try {
            if (window.top && window.top !== window) {
              return window.top;
            }
          } catch (_err) {
            // No-op
          }
          return window;
        }

        function readStoredLogin() {
          let loginValue = "";
          const targetWindow = getTargetWindow();
          try {
            loginValue = String(
              targetWindow.localStorage.getItem("jira_focus_user_login") || ""
            )
              .trim()
              .toLowerCase();
            if (!loginValue) {
              const rawProfile = targetWindow.localStorage.getItem("jira_focus_user_profile") || "";
              if (rawProfile) {
                const parsedProfile = JSON.parse(rawProfile);
                if (parsedProfile && typeof parsedProfile === "object") {
                  loginValue = String(
                    parsedProfile.login || parsedProfile.emailAddress || ""
                  )
                    .trim()
                    .toLowerCase();
                }
              }
            }
            if (!loginValue) {
              loginValue = String(targetWindow.localStorage.getItem("emailAddress") || "")
                .trim()
                .toLowerCase();
            }
            if (loginValue) {
              targetWindow.localStorage.setItem("jira_focus_user_login", loginValue);
            }
          } catch (_err) {
            loginValue = "";
          }
          return loginValue;
        }

        function onRender() {
          Streamlit.setComponentValue(readStoredLogin());
          Streamlit.setFrameHeight(0);
        }

        Streamlit.events.addEventListener(Streamlit.RENDER_EVENT, onRender);
        Streamlit.setComponentReady();
        Streamlit.setFrameHeight(0);
      })();
    </script>
  </body>
</html>
